
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Product Website</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
    }
    header {
      background: #0d6efd;
      color: white;
      padding: 20px;
      text-align: center;
    }
    nav {
      padding: 10px;
      text-align: center;
    }
    nav a {
      margin: 0 15px;
      text-decoration: none;
      color: #333;
      font-weight: bold;
    }
    .hero {
      background: url('https://picsum.photos/1200/400') no-repeat center center/cover;
      color: white;
      text-align: center;
      padding: 80px 20px;
    }
    .hero h1 {
      font-size: 50px;
    }
    .products {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      padding: 20px;
    }
    .product-card {
      border: 1px solid #ddd;
      border-radius: 10px;
      width: 250px;
      margin: 15px;
      text-align: center;
      padding: 15px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    .product-card img {
      max-width: 100%;
      border-radius: 10px;
    }
    .product-card h3 {
      margin: 10px 0;
    }
    .btn {
      display: inline-block;
      background: #0d6efd;
      color: white;
      padding: 10px 15px;
      border-radius: 5px;
      text-decoration: none;
    }
    footer {
      background: #333;
      color: white;
      text-align: center;
      padding: 15px;
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <header>
    <h1> Anzum Organic food</h1>
    <p>Best Products at Affordable Price</p>
  </header>

  <nav>
    <a href="#">Home</a>
    <a href="#">Products</a>
    <a href="#">About Us</a>
    <a href="#">Contact</a>
  </nav>

  <section class="hero">
    <h1>Welcome to Our Store</h1>
    <p>Find the best products here!</p>
    <a href="#products" class="btn">Shop Now</a>
  </section>

  <section id="products" class="products">
    <div class="product-card">
      <img src="https://picsum.photos/250/200?1" alt="Product 1">
      <h3>Product One</h3>
      <p>$25.00</p>
      <a href="#" class="btn">Buy Now</a>
    </div>
    <div class="product-card">
      <img src="https://picsum.photos/250/200?2" alt="Product 2">
      <h3>Product Two</h3>
      <p>$35.00</p>
      <a href="#" class="btn">Buy Now</a>
    </div>
    <div class="product-card">
      <img src="https://picsum.photos/250/200?3" alt="Product 3">
      <h3>Product Three</h3>
      <p>$45.00</p>
      <a href="#" class="btn">Buy Now</a>
    </div>
  </section>

  <footer>
    <p>© 2026 My Product Store | All Rights Reserved</p>
  </footer>

</body>
</html>
